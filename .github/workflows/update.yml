name: Auto-update packages

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  # List every packages/<name>/update.nu so downstream jobs can fan out.
  discover:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          PKGS=$(ls -d packages/*/update.nu \
            | xargs -n1 dirname \
            | xargs -n1 basename \
            | jq -R . \
            | jq -sc .)
          echo "packages=$PKGS" >> $GITHUB_OUTPUT
          echo "Discovered: $PKGS"

  # One job per package: check upstream, rewrite files if needed, upload
  # the modified packages/<name>/ tree + a small status JSON. README is
  # intentionally not touched here so parallel runners don't race over
  # the same file — the aggregator handles READMEs in a single serial
  # pass at the end.
  update:
    needs: discover
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Lets `use update-lib *` resolve without the relative ../../ path.
      NU_LIB_DIRS: ${{ github.workspace }}/scripts
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install Nushell
        run: nix profile install nixpkgs#nushell

      # continue-on-error so a flaky per-package update (e.g. transient
      # build failure during hash discovery) doesn't fail the matrix job
      # and skip aggregate via needs:. We just don't upload an artifact
      # for this package; aggregate will silently leave it on its current
      # version and pick up the other packages.
      - name: Run update
        id: update
        continue-on-error: true
        run: |
          OUTPUT=$(nu scripts/update-package.nu ${{ matrix.package }})
          echo "$OUTPUT"
          {
            echo "updated=$(echo "$OUTPUT" | grep '^updated=' | cut -d= -f2)"
            echo "current=$(echo "$OUTPUT" | grep '^current=' | cut -d= -f2)"
            echo "latest=$(echo "$OUTPUT" | grep '^latest='  | cut -d= -f2)"
          } >> $GITHUB_OUTPUT

      - name: Write status JSON
        if: steps.update.outputs.updated == 'true' && steps.update.outcome == 'success'
        run: |
          mkdir -p update-result
          jq -n \
            --arg pkg "${{ matrix.package }}" \
            --arg current "${{ steps.update.outputs.current }}" \
            --arg latest "${{ steps.update.outputs.latest }}" \
            '{package: $pkg, current: $current, latest: $latest}' \
            > update-result/${{ matrix.package }}.json

      - name: Upload artifact
        if: steps.update.outputs.updated == 'true' && steps.update.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: update-${{ matrix.package }}
          path: |
            packages/${{ matrix.package }}/
            update-result/${{ matrix.package }}.json

  # Merge all per-package updates: apply each artifact's modified
  # packages/<name>/ tree onto a fresh checkout, run the per-package
  # README rewrite, verify with flake check, then commit + push.
  aggregate:
    needs: [discover, update]
    # Run even if some matrix jobs failed (e.g. one package's update
    # broke) so the rest still get committed. The job gracefully no-ops
    # when no artifacts arrived.
    if: always() && needs.discover.result == 'success'
    runs-on: ubuntu-latest
    env:
      NU_LIB_DIRS: ${{ github.workspace }}/scripts
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install Nushell
        run: nix profile install nixpkgs#nushell

      - name: Download all update artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: update-*

      - name: Apply per-package artifacts
        id: apply
        run: |
          set -euo pipefail
          UPDATED_PKGS=()
          shopt -s nullglob
          for dir in artifacts/update-*; do
            pkg=$(basename "$dir" | sed 's/^update-//')
            status_file="$dir/update-result/$pkg.json"
            if [ ! -f "$status_file" ]; then
              echo "No status file for $pkg — skipping"
              continue
            fi
            # The matrix-modified packages/<pkg>/ tree replaces the
            # checkout's copy. Each artifact's files are disjoint.
            cp -r "$dir/packages/$pkg/." "packages/$pkg/"
            UPDATED_PKGS+=("$pkg")
          done

          if [ ${#UPDATED_PKGS[@]} -eq 0 ]; then
            echo "any-updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "any-updated=true" >> $GITHUB_OUTPUT

          {
            echo "chore: update packages"
            echo
            for pkg in "${UPDATED_PKGS[@]}"; do
              status_file="artifacts/update-$pkg/update-result/$pkg.json"
              current=$(jq -r .current "$status_file")
              latest=$(jq -r .latest "$status_file")
              echo "- $pkg: $current → $latest"
            done
          } > commit-message.txt

          echo "--- commit message ---"
          cat commit-message.txt

      # Regenerate the README package table from the merged tree —
      # render-readme reads version + meta.{description, mainProgram}
      # straight out of each default.nix.
      - name: Regenerate README
        if: steps.apply.outputs.any-updated == 'true'
        run: nu scripts/render-readme.nu

      - name: Flake check
        if: steps.apply.outputs.any-updated == 'true'
        run: nix flake check --print-build-logs

      - name: Commit and push
        if: steps.apply.outputs.any-updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/ README.md
          git commit -F commit-message.txt
          git push
